name: romi_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ✅ Firebase 관련 패키지 (최신 안정 버전)
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.4
  firebase_storage: ^11.6.6

  # ✅ 날짜 및 로케일 처리
  intl: ^0.19.0

  # ✅ 이미지 업로드 / 선택
  image_picker: ^1.1.2

  # ✅ HTTP 통신 (REST API, OpenAI 연동)
  http: ^1.2.1

  # ✅ 상태 관리
  provider: ^6.1.1

  # ✅ ✅ ✅ UUID 생성 패키지 추가 (필수!)
  uuid: ^4.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/images/

  fonts:
    - family: SpoqaHanSansNeo
      fonts:
        - asset: assets/fonts/SpoqaHanSansNeo-Regular.ttf
        - asset: assets/fonts/SpoqaHanSansNeo-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpoqaHanSansNeo-Light.ttf
          weight: 300
